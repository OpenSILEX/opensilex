ontologies:
    baseURI: http://vegetalunit.inrae.fr/vigne/
    baseURIAlias: sixtine-vigne
    sparql:
        config:
            serverURI: http://iado.mistea.inrae.fr:8080/rdf4j-server/
            repository: sixtine-iado-preprod


file-system:
    fs:
        config:
            basePath: /home/opensilex/opensilex-instances/data/sixtine-vigne/iado/preprod


big-data:
    mongodb:
        config:
            # MongoDB main host (String)
            host: iado.mistea.inrae.fr
            # MongoDB main host port (int)
            port: 27017
            # MongoDB database (String)
            database: sixtine-iado-preprod


