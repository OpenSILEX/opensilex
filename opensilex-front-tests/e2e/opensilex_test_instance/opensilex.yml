ontologies:
    baseURI: http://opensilex.front-test/
    baseURIAlias: opensilex-front-test
    sparql:
        config:
            serverURI: http://localhost:8667/rdf4j-server/
            repository: front-test

file-system:
    fs:
        config:
            defaultFS: local
            connections:
                local:
                    implementation: org.opensilex.fs.local.LocalFileSystemConnection
                    config:
                        basePath: ../../opensilex-data
        gridfs:
            implementation: org.opensilex.fs.gridfs.GridFSConnection
            config:
                host: localhost
                port: 8668
                database: front-test

big-data:
    mongodb:
        config:
            host: localhost
            port: 8668
            database: front-test

system:
    ignoredModules:
        org.opensilex.opensilex-mobile.MobileModule: opensilex-mobile.jar
