ontologies:
    baseURI: http://opensilex.test/
    baseURIAlias: dev
    sparql:
        #        implementation: org.opensilex.sparql.rdf4j.RDF4JInMemoryServiceFactory
        config:
            serverURI: http://localhost:8667/rdf4j-server/
            repository: insect_behaveOpt

big-data:
    mongodb:
        config:
            host: localhost
            port: 8668
            database: insect_behaveOpt
    #            timezone: Europe/Paris

core:
    enableLogs: true
    enableOntologyCaching: false
    metrics:
        # Metrics configs about system (SystemMetricsConfig)
        enableMetrics: true
        system:
            # First metrics for any time depending on is time unit (int)
            timeBeforeFirstMetric: 1
            # Delay between whole system metrics (combined with corresponding TimeUnit) (int)
            delayBetweenMetrics: 30
            # Default metrics units : DAYS, HOURS, MINUTES, SECONDS are authorized (String)
            metricsTimeUnit: MINUTES
        # Metrics configs about experiments (ExperimentsMetricsConfig)
        experiments:
            # First metrics for any time depending on is time unit (int)
            timeBeforeFirstMetric: 1
            # Delay between whole system metrics (combined with corresponding TimeUnit) (int)
            delayBetweenMetrics: 30
            # Default metrics units : DAYS, HOURS, MINUTES, SECONDS are authorized (String)
            metricsTimeUnit: MINUTES

front:
    dashboard:
        graph1:
            variable: http://opensilex.test/id/variable/air_temperature_datalogging_degreecelsius
