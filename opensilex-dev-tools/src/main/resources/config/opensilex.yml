ontologies:
    baseURI: http://phenome.inrae.fr/m3p/
    baseURIAlias: m3p
    sparql:
        config:
            serverURI: http://138.102.159.37/rdf4j-server/
            repository: optimization_m3p

file-system:
    fs:
        config:
            # Default file system storage (String)
            defaultFS: gridfs
            # Map of file storage connection definition by identifier (Map<String,FileStorageConnection>)
            connections:
                gridfs:
                    # Service implementation class for: gridfs (FileStorageConnection)
                    implementation: org.opensilex.fs.gridfs.GridFSConnection
                    config:
                        # MongoDB main host (String)
                        host: 138.102.159.98
                        # MongoDB main host port (int)
                        port: 27017
                        database: optimization_m3p

big-data:
  mongodb:
    config:
      host: 138.102.159.98
      port: 27017
      database: optimization_m3p
    #            timezone: Europe/Paris

phisws:
    infrastructure: opensilex
# Configuration for module: SecurityModule (SecurityConfig)
