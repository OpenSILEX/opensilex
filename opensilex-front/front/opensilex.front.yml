          credentials:
            - vocabulary-access
          icon: bi#bi-gear
          title: component.ontology.typeView.event.title
          description: component.ontology.typeView.event.description
      - id: deviceVocabulary
        label: component.menu.deviceTypes
        route:
          path: /device-types
          component: opensilex-DeviceTypes
          credentials:
            - vocabulary-access
          icon: bi#bi-gear
          title: component.ontology.typeView.device.title
          description: component.ontology.typeView.device.description
      - id: organizationVocabulary
        label: component.menu.facilitiesTypes
        route:
          path: /facilities-types
          component: opensilex-FacilitiesTypes
          credentials:
            - vocabulary-access
          icon: bi#bi-gear
          title: component.ontology.typeView.facility.title
          description: component.ontology.typeView.facility.description
      - id: factorCategoryVocabulary
        label: component.menu.factorCategoryTypes
        route:
          path: /factor-category-types
          component: opensilex-FactorCategoryTypes
          credentials:
            - vocabulary-access
          icon: bi#bi-gear
          title: component.ontology.typeView.factoryCategory.title
          description: component.ontology.typeView.factoryCategory.description
      - id: namespacesVocabulary
        label: component.menu.namespaces
        route:
          path: /namespaces
          component: opensilex-NamespacesView
          credentials:
            - vocabulary-access
          icon: bi#bi-gear
          title: component.ontology.namespace.title
          description: component.ontology.namespace.description
  - id: configuration
    label: component.menu.configuration
    children:
      - id: Accounts
        label: component.menu.security.accounts
        route:
          path: /accounts
          component: opensilex-AccountView
          credentials:
            - account-access
          icon: bi#bi-user
          title: AccountView.title
          description: AccountView.description
      - id: groups
        label: component.menu.security.groups
        route:
          path: /groups
          component: opensilex-GroupView
          credentials:
            - group-access
          icon: bi#bi-people
          title: component.menu.security.groups
          description: component.group.description
      - id: profiles
        label: component.menu.security.profiles
        route:
          path: /profiles
          component: opensilex-ProfileView
          credentials:
            - profile-access
          icon: bi#bi-gear
          title: component.menu.security.profiles
          description: component.profile.description
  - id: about
    label: component.menu.about.label
    children:
      - id: system
        label: component.menu.about.system
        route:
          path: /system
          component: opensilex-SystemView
          credentials:
            - is-admin
          icon: bi#bi-layers
          title: component.system.title
          description: component.system.description
      - id: gdpr
        label: component.menu.about.gdpr
        route:
          path: /gdpr
          component: opensilex-GDPR
          icon: bi#bi-person
          title: component.GDPR.title
          description: component.GDPR.title-description
  - id: tools
    label: component.menu.tools.label
    children:
      - id: packages
        label: component.menu.tools.packages
        route:
          path: /packages
          component: opensilex-PackagesView
          credentials:
            - package-access
          icon: bi#bi-layers
          title: component.packages.title
          description: component.packages.description


